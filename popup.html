<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>Reverser</title>
  </head>
  <body>
    <header class="top">
      <span class="logo">⏪</span>
      <h1>Reverser</h1>
      <button id="gear" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
    </header>

    <p class="site" id="site">…</p>

    <div class="scrub">
      <button id="prev" class="step" title="older" disabled>◀</button>
      <input type="range" id="slider" min="0" max="0" value="0" disabled />
      <button id="next" class="step" title="newer" disabled>▶</button>
    </div>
    <div class="ends">
      <span>oldest</span>
      <span>now</span>
    </div>

    <p class="when" id="when">reading this site's history…</p>

    <!-- play through time -->
    <div class="controls" id="controls" hidden>
      <button id="play" class="pill" title="play through time">▶ Play</button>
    </div>

    <div class="loader" id="loader" hidden>
      <strong class="lhead" id="lhead">Hold on while we take you back</strong>
      <div class="lline" id="lline">
        <span class="ltext" id="ltext">Time travelling</span>
        <span class="dots"><i>.</i><i>.</i><i>.</i></span>
      </div>
    </div>

    <button id="stop" class="stop" hidden>⏹ Back to live page</button>

    <!-- settings drawer, toggled by the gear -->
    <section class="settings" id="settings" hidden>
      <h2>Settings</h2>

      <label class="row">
        <span>Theme</span>
        <select id="set-theme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="auto">Auto (OS)</option>
        </select>
      </label>

      <label class="row">
        <span>Autoplay speed</span>
        <select id="set-speed">
          <option value="0">0.5×</option>
          <option value="1">1×</option>
          <option value="2">2×</option>
        </select>
      </label>

      <label class="row toggle">
        <span>Loop autoplay</span>
        <input type="checkbox" id="set-loop" />
      </label>
      <label class="row toggle">
        <span>Show stats</span>
        <input type="checkbox" id="set-stats" />
      </label>
      <label class="row toggle">
        <span>Verbose console logging</span>
        <input type="checkbox" id="set-verbose" />
      </label>

      <div class="settings-actions">
        <button id="reset-settings" class="ghost">Reset settings</button>
      </div>
    </section>

    <div class="toast" id="toast" hidden></div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
