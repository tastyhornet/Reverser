<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>Reverser</title>
  </head>
  <body>
    <header class="top">
      <span class="logo">⏪</span>
      <h1>Reverser</h1>
    </header>

    <p class="site" id="site">…</p>

    <div class="scrub">

    <p class="when" id="when">reading this site's history…</p>

    <button id="stop" class="stop" hidden>⏹ Back to live page</button>

    <script type="module" src="popup.js"></script>
  </body>
</html>
